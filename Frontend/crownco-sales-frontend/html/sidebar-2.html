<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crownco Sidebar</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* --- RESET & VARIABLES --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        :root {
            --sidebar-width: 280px;
            --primary-blue: #2544a8; /* Crownco Blue */
            --text-main: #344054;
            --text-sub: #667085;
            --bg-hover: #F9FAFB;
            --bg-active: #F2F4F7; /* Light grey for active state */
            --border-color: #EAECF0;
        }

        body {
            background-color: #F2F4F7; /* Outer bg just to show contrast */
            height: 100vh;
            display: flex;
        }

        /* --- SIDEBAR CONTAINER --- */
        aside {
            width: var(--sidebar-width);
            height: 100%;
            background-color: #ffffff;
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        /* --- LOGO SECTION --- */
        .logo-container {
            padding: 24px 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .brand-logo {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--primary-blue);
        }
        
        .brand-logo svg {
            width: 120px;
            height: auto;
            fill: var(--primary-blue);
        }

        /* --- MENU SCROLL AREA --- */
        .menu-wrapper {
            flex: 1;
            overflow-y: auto;
            padding: 10px 16px;
        }

        /* --- NAVIGATION LISTS --- */
        ul {
            list-style: none;
            margin-bottom: 24px;
        }

        .section-label {
            font-size: 11px;
            font-weight: 600;
            color: #98A2B3;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
            padding-left: 12px;
            margin-top: 24px;
        }

        /* Separator line */
        .divider {
            height: 1px;
            background-color: var(--border-color);
            margin: 10px 0 20px 0;
            width: 100%;
        }

        /* --- MENU ITEM --- */
        .menu-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 12px;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
            color: var(--text-main);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 4px;
        }

        .menu-item:hover {
            background-color: var(--bg-hover);
            color: #101828;
        }

        /* Active State Styling */
        .menu-item.active {
            background-color: var(--bg-active);
            color: #101828;
            font-weight: 600;
        }

        .item-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        /* Icons */
        .icon {
            width: 20px;
            height: 20px;
            color: var(--text-sub);
            stroke-width: 1.8;
        }

        .menu-item:hover .icon,
        .menu-item.active .icon {
            color: var(--text-main);
            stroke-width: 2; /* Make icon slightly bolder on active/hover */
        }

        /* --- FOOTER (Marketing Team) --- */
        .sidebar-footer {
            padding: 16px;
            border-top: 1px solid var(--border-color);
        }

        .team-selector {
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            padding: 8px;
            border-radius: 8px;
        }
        
        .team-selector:hover {
            background-color: var(--bg-hover);
        }

        .team-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .avatar {
            width: 32px;
            height: 32px;
            background-color: #ECFDF3;
            color: #027A48;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 14px;
        }

        .team-name {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-main);
        }

        .right-icon-faded {
            color: #98A2B3;
            width: 16px; 
            height: 16px;
        }

    </style>
</head>
