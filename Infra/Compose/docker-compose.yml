services:
  postgres:
    image: postgres:16-alpine
    container_name: crownco-postgres
    environment:
      POSTGRES_USER: crownco-db-user
      POSTGRES_PASSWORD: crownco-db-password
      POSTGRES_DB: crownco-db
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data/pgdata
      - ../../Backend/Database:/docker-entrypoint-initdb.d/schemas:ro
      - ./init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crownco-db-user -d crownco-db"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: crownco-redis
    command: redis-server --requirepass crownco-redis-password
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
