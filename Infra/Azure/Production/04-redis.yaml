apiVersion: v1
kind: Service
metadata:
  name: crownco-redis
  namespace: crownco-production
spec:
  type: ClusterIP
  selector:
    app: crownco-redis
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: crownco-redis
  namespace: crownco-production
spec:
  replicas: 1
  selector:
    matchLabels:
      app: crownco-redis
  template:
    metadata:
      labels:
        app: crownco-redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
              name: redis
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: crownco-core-api-secrets
                  key: REDIS_PASSWORD
          args:
            - sh
            - -lc
            - >
              exec redis-server
              --requirepass "$REDIS_PASSWORD"
              --appendonly yes
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
