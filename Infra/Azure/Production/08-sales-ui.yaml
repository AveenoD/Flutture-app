apiVersion: v1
kind: Service
metadata:
  name: crownco-sales-ui
  namespace: crownco-production
spec:
  type: ClusterIP
  selector:
    app: crownco-sales-ui
  ports:
    - name: http
      port: 80
      targetPort: 3000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: crownco-sales-ui
  namespace: crownco-production
spec:
  replicas: 2
  selector:
    matchLabels:
      app: crownco-sales-ui
  template:
    metadata:
      labels:
        app: crownco-sales-ui
    spec:
      imagePullSecrets:
        - name: acr-pull-secret
      containers:
        - name: sales-ui
          image: crownco/sales-ui:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
          envFrom:
            - configMapRef:
                name: crownco-ui-config
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
