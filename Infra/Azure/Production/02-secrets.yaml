apiVersion: v1
kind: Secret
metadata:
  name: crownco-core-api-secrets
  namespace: crownco-production
type: Opaque
stringData:
  POSTGRES_PASSWORD: "CHANGE_ME"
  REDIS_PASSWORD: "CHANGE_ME"
  JWT_SECRET: "CHANGE_ME"
  B2_KEY_ID: ""
  B2_APP_KEY: ""
  B2_BUCKET_NAME: "crownco-ai"
  B2_REGION: "s-east-005"
  B2_ENDPOINT: "s3.us-east-005.backblazeb2.com"
  WA_APP_SECRET: ""
---
# Create this with:
# kubectl -n crownco-production create secret docker-registry acr-pull-secret \
#   --docker-server=... --docker-username=... --docker-password=... --docker-email=...
apiVersion: v1
kind: Secret
metadata:
  name: acr-pull-secret
  namespace: crownco-production
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: ""
