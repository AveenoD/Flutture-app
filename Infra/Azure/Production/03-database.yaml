apiVersion: v1
kind: Service
metadata:
  name: crownco-postgres
  namespace: crownco-production
spec:
  # Headless service for StatefulSet stable DNS
  clusterIP: None
  selector:
    app: crownco-postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
---
apiVersion: v1
kind: Service
metadata:
  name: crownco-postgres-primary
  namespace: crownco-production
spec:
  type: ClusterIP
  selector:
    app: crownco-postgres
    statefulset.kubernetes.io/pod-name: crownco-postgres-0
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: crownco-postgres
  namespace: crownco-production
spec:
  serviceName: crownco-postgres
  replicas: 2
  selector:
    matchLabels:
      app: crownco-postgres
  template:
    metadata:
      labels:
        app: crownco-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
              name: postgres
          env:
            - name: POSTGRES_USER
              value: crownco-db-user
            - name: POSTGRES_DB
              value: crownco-db
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: crownco-core-api-secrets
                  key: POSTGRES_PASSWORD
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 10Gi
