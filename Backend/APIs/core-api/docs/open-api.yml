      summary: Qualify lead
      description: |
        Set lead status to `qualified` and optionally enrich profile (e.g. when a fresh lead has only phone). **Presales only.** Lead must be assigned to the current user.
      operationId: qualifyLead
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QualifyLeadRequest'
      responses:
        '200':
          description: Lead qualified successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    type: object
                    properties:
                      lead:
                        $ref: '#/components/schemas/LeadResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          description: Forbidden (only Presales)
        '404':
          description: Lead not found or not assigned to current user
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/leads/{id}/connected:
    post:
      tags:
        - Leads
      summary: Mark lead connected
      description: |
        Set lead status to `called` (connected). **Presales only.** Lead must be assigned to the current user.
      operationId: markLeadConnected
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Lead marked connected successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    type: object
                    properties:
                      lead:
                        $ref: '#/components/schemas/LeadResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          description: Forbidden (only Presales)
        '404':
          description: Lead not found or not assigned to current user
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/leads/{id}/reject:
    post:
      tags:
        - Leads
      summary: Reject lead with reasons
      description: |
        Reject the lead with selected rejection-question answers. Creates a `lead_rejections` row and sets lead status to `rejected`.
        **Authorization:** Presales or Sales. Lead must be assigned to the current user.
        Call `GET /api/v1/rejection-questions` first to get questions and options.
      operationId: rejectLead
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RejectLeadRequest'
      responses:
        '200':
          description: Lead rejected successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    type: object
                    properties:
                      lead_id:
                        type: string
                        format: uuid
                      rejection_id:
                        type: string
                        format: uuid
                      lead:
                        $ref: '#/components/schemas/LeadResponse'
        '400':
          description: Invalid body (e.g. empty questions_response)
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          description: Forbidden (only Presales or Sales)
        '404':
          description: Lead not found or not assigned to current user
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/leads/{id}/forward-stage:
    post:
      tags:
        - Leads
      summary: Forward lead to next stage
      description: |
        Move lead to the next stage. Completes current lead_stages row and creates a new one; updates leads.stage.
        **Allowed flow:** qualification → communication → property_visit → negotiation → booking.
        **Presales:** Can perform all transitions. **Sales:** From site_visit/property_visit to negotiation (after visit); from negotiation to booking only when at least one quotation is manager-approved (`quotation_status = approved`). Lead must be assigned to the current user.
      operationId: forwardLeadToStage
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForwardStageRequest'
      responses:
        '200':
          description: Lead stage updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    type: object
                    properties:
                      lead:
                        $ref: '#/components/schemas/LeadResponse'
        '400':
          description: Invalid next_stage or invalid transition
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          description: Forbidden (only Presales or Sales)
        '404':
          description: Lead not found or not assigned to current user
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/leads/{id}/negotiation/price-breakdown:
    get:
      tags: [Leads, Sales]
      summary: Get negotiation price breakdown
      description: Returns computed price breakdown (unit charges + addons - discount) for the lead's negotiation. Sales only; lead must be assigned.
      operationId: getNegotiationPriceBreakdown
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Price breakdown retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  message: { type: string }
                  data:
                    type: object
                    properties:
                      price_breakdown:
                        $ref: '#/components/schemas/PriceBreakdownResponse'
        '404': { description: Lead or negotiation not found }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /api/v1/leads/{id}/negotiation/submit:
    post:
      tags: [Leads, Sales]
      summary: Submit negotiation for approval
      description: Sets negotiation status to submitted_for_approval. Sales only; only when status is draft.
      operationId: submitNegotiation
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200': { description: Negotiation submitted }
        '400': { description: Negotiation not in draft status }
        '404': { description: Lead or negotiation not found }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /api/v1/leads/{id}/negotiation/approve:
    post:
      tags: [Leads, Managers]
      summary: Approve negotiation
      description: GM/Manager only. Sets negotiation status to approved. Optional body final_price_agreed.
      operationId: approveNegotiation
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                final_price_agreed: { type: number, format: double }
      responses:
        '200': { description: Negotiation approved }
        '400': { description: Negotiation not pending approval }
        '404': { description: Lead or negotiation not found }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /api/v1/leads/{id}/negotiation/reject:
    post:
      tags: [Leads, Managers]
      summary: Reject negotiation
      description: GM/Manager only. Sets negotiation status to rejected and releases unit back to available.
      operationId: rejectNegotiation
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                remarks: { type: string }
      responses:
        '200': { description: Negotiation rejected }
        '400': { description: Negotiation not pending approval }
        '404': { description: Lead or negotiation not found }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /api/v1/leads/{id}/negotiation:
    post:
      tags: [Leads, Sales]
      summary: Create negotiation
      description: Create a single negotiation for the lead. Sales only; lead must be in negotiation stage. Locks unit to under_negotiation.
      operationId: createNegotiation
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [project_id, unit_id]
              properties:
                project_id: { type: string, format: uuid }
                unit_id: { type: string, format: uuid }
                addon_ids: { type: array, items: { type: string, format: uuid } }
                price_offered: { type: number }
                discount_amount: { type: number }
                discount_title: { type: string }
                user_commission: { type: number }
      responses:
        '201': { description: Negotiation created }
        '400': { description: Lead not in negotiation stage, negotiation already exists, or unit not available }
        '404': { description: Lead not found }
        '500': { $ref: '#/components/responses/InternalServerError' }
    get:
      tags: [Leads, Sales]
      summary: Get negotiation
      description: Returns the lead's negotiation with joined project, unit, and addons. Sales only.
      operationId: getNegotiation
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200': { description: Negotiation with project, unit, addons }
        '404': { description: Lead or negotiation not found }
        '500': { $ref: '#/components/responses/InternalServerError' }
    patch:
      tags: [Leads, Sales]
      summary: Update negotiation
      description: Update negotiation. Sales only; only when status is draft. If unit_id changes, releases old unit and locks new one.
      operationId: updateNegotiation
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                project_id: { type: string, format: uuid }
                unit_id: { type: string, format: uuid }
                addon_ids: { type: array, items: { type: string, format: uuid } }
                price_offered: { type: number }
                discount_amount: { type: number }
                discount_title: { type: string }
                user_commission: { type: number }
      responses:
        '200': { description: Negotiation updated }
        '400': { description: Not draft or unit not available }
        '404': { description: Lead or negotiation not found }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /api/v1/quotations:
    get:
      tags: [Quotations]
      summary: List quotations (org-wide)
      description: >
        Paginated quotations for leads visible to the user (sales / manager / GM). Tab filter: `all`, `approved`,
        `pending` (shared + revised), `draft`. Optional `q` searches customer name, project title, unit name, quotation id.
        Optional `project` filters by project title (ILIKE). Sort: `date` (default), `price`, `customer`; `order`: `asc` | `desc`.
      operationId: listQuotationsForOrg
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: page, in: query, schema: { type: integer, minimum: 1, default: 1 } }
        - { name: limit, in: query, schema: { type: integer, minimum: 1, maximum: 100, default: 20 } }
        - { name: tab, in: query, schema: { type: string, enum: [all, approved, pending, draft], default: all } }
        - { name: q, in: query, schema: { type: string } }
        - { name: project, in: query, schema: { type: string } }
        - { name: sort, in: query, schema: { type: string, enum: [date, price, customer], default: date } }
        - { name: order, in: query, schema: { type: string, enum: [asc, desc], default: desc } }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  message: { type: string }
                  data:
                    type: object
                    properties:
                      quotations:
                        type: array
                        items: { type: object }
                      pagination:
                        type: object
                        properties:
                          page: { type: integer }
                          limit: { type: integer }
                          total: { type: integer }
                          total_pages: { type: integer }
                      tab_counts:
                        type: object
                        properties:
                          all: { type: integer }
                          approved: { type: integer }
                          pending: { type: integer }
                          draft: { type: integer }
        '401': { description: Unauthorized }
        '403': { description: Forbidden }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /api/v1/quotations/stats:
    get:
      tags: [Quotations]
      summary: Quotation KPI stats
      description: >
        Aggregates quotation counts and total value (INR) for leads visible to the user (sales / manager / GM),
        using the same lead visibility rules as the dashboard. Growth percentages compare month-to-date vs the
        same elapsed window in the previous calendar month. Pending counts quotations in shared or revised status.
      operationId: getQuotationStats
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  message: { type: string }
                  data:
                    type: object
                    properties:
                      stats:
                        type: object
                        properties:
                          total_quotations: { type: integer }
                          total_quotations_growth_pct: { type: number, format: float }
                          total_value_inr: { type: number, format: double }
                          total_value_growth_pct: { type: number, format: float }
                          this_month_count: { type: integer }
                          this_month_growth_pct: { type: number, format: float }
                          approved_count: { type: integer }
                          approved_growth_pct: { type: number, format: float }
                          pending_count: { type: integer }
                          pending_growth_pct: { type: number, format: float }
        '401': { description: Unauthorized }
        '403': { description: Forbidden — wrong role or no organization }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /api/v1/leads/{id}/quotations:
    post:
      tags: [Leads]
      summary: Create quotation
      description: >
        Create a quotation. `unit_id` is required. Flow: select project + unit + optional add-ons;
        optionally add discount, customer info (typically pre-filled from lead), and validity.
        `project_id` and `addon_ids` override the latest negotiation when provided.
        Discount and customer fields are quotation-level; price base is copied from the unit. Sales only.
        If the lead already has quotations in draft, shared, revised, or approved status, those rows are
        set to rejected before inserting the new quotation as draft so the manager only reviews the latest version.
      operationId: createQuotation
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [unit_id]
              properties:
                unit_id: { type: string, format: uuid, description: Unit to base the quotation on (required). }
                project_id: { type: string, format: uuid, description: Override project (optional, defaults to current negotiation project). }
                addon_ids:
                  type: array
                  items: { type: string, format: uuid }
                  description: Override addon list (optional).
                discount_name: { type: string, description: Discount label/reason (optional). }
                discount_price: { type: number, description: Discount amount in currency (optional). }
                customer_name: { type: string, description: Customer name (optional; client typically pre-fills from lead). }
                customer_contact: { type: string, description: Customer phone (optional). }
                customer_email: { type: string, description: Customer email (optional). }
                valid_till: { type: string, format: date, description: Quotation validity date YYYY-MM-DD (optional). }
      responses:
        '201': { description: Quotation created }
        '400': { description: unit_id missing or UNIT_REQUIRED }
        '404': { description: Lead or negotiation not found }
        '500': { $ref: '#/components/responses/InternalServerError' }
    get:
      tags: [Leads]
      summary: List quotations
      description: List all quotations for the lead. Sales, Manager, and GM.
      operationId: listQuotations
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: limit
          in: query
          schema: { type: integer, default: 20 }
      responses:
        '200': { description: Quotations and pagination }
        '404': { description: Lead not found }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /api/v1/leads/{id}/quotations/{qid}:
    get:
      tags: [Leads]
      summary: Get quotation
      description: Get a single quotation. Sales, Manager, and GM.
      operationId: getQuotation
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: qid
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200': { description: Quotation details }
        '404': { description: Quotation not found }
        '500': { $ref: '#/components/responses/InternalServerError' }
    patch:
      tags: [Leads]
      summary: Revise quotation
      description: Update quotation (price fields, discount, customer info). Increments version and sets status to revised. Sales only.
      operationId: updateQuotation
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: qid
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                base_price: { type: number }
                parking_price: { type: number }
                discount_name: { type: string }
                discount_price: { type: number }
                customer_name: { type: string }
                customer_contact: { type: string }
                customer_email: { type: string }
                valid_till: { type: string, format: date }
      responses:
        '200': { description: Quotation updated }
        '404': { description: Quotation not found }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /api/v1/leads/{id}/quotations/{qid}/share:
    post:
      tags: [Leads]
      summary: Mark quotation as shared
      description: Sets quotation_status to shared and shared_via. Sales only.
      operationId: shareQuotation
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: qid
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [shared_via]
              properties:
                shared_via: { type: string, enum: [whatsapp, email, pdf_download] }
      responses:
        '200': { description: Quotation marked as shared }
        '404': { description: Quotation not found }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /api/v1/leads/{id}/quotations/{qid}/approve:
    post:
      tags: [Leads]
      summary: Approve quotation
      description: >
        Sets quotation_status to approved. Manager/GM only. Before approving, all other quotations
        for the same lead in draft/shared/revised/approved are set to rejected so only the selected
        row stays approved (e.g. approving v2 rejects v1). A unique partial index also enforces at
        most one approved per lead. Returns 409 if the approve still conflicts (rare race).
      operationId: approveQuotation
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: qid
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200': { description: Quotation approved }
        '403': { description: Not a manager or GM }
        '404': { description: Quotation not found }
        '409': { description: Another quotation already approved for this lead }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /api/v1/leads/{id}/quotations/{qid}/reject:
    post:
      tags: [Leads]
      summary: Reject quotation
      description: >
        Sets quotation_status to rejected and stores rejection_reason for sales to read. Manager/GM only.
        Body must include a non-empty rejection_reason (remarks accepted as alias).
      operationId: rejectQuotation
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: qid
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: Send a non-empty rejection_reason or remarks (same meaning).
              properties:
                rejection_reason:
                  type: string
                  description: Why the quotation was rejected (shown to sales).
                remarks:
                  type: string
                  description: Alias for rejection_reason.
      responses:
        '200': { description: Quotation rejected }
        '400': { description: rejection_reason missing or empty }
        '403': { description: Not a manager or GM }
        '404': { description: Quotation not found }
        '500': { $ref: '#/components/responses/InternalServerError' }

  # ----- Booking stage (Stage 5, sales only) -----
  /api/v1/leads/{id}/booking/submit:
    post:
      tags: [Leads]
      summary: Submit booking (token received)
      description: Sets booking_status to token_received and leads.status to deal so the lead appears on Manager/GM dashboard. Sales only; booking must be initiated or token_received.
      operationId: submitBooking
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200': { description: Booking submitted; lead marked as deal }
        '400': { description: Booking not in editable status }
        '403': { description: Not sales or lead not assigned }
        '404': { description: Lead or booking not found }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /api/v1/leads/{id}/booking/confirm:
    post:
      tags: [Leads]
      summary: Confirm booking
      description: GM/Manager only. Sets booking_status to confirmed.
      operationId: confirmBooking
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200': { description: Booking confirmed }
        '400': { description: Booking already cancelled }
        '403': { description: Not GM/Manager }
        '404': { description: Lead or booking not found }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /api/v1/leads/{id}/booking/cancel:
    post:
      tags: [Leads]
      summary: Cancel booking
      description: Sales or GM/Manager. Sets booking_status to cancelled and releases unit back to available.
      operationId: cancelBooking
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200': { description: Booking cancelled }
        '400': { description: Booking already cancelled }
        '403': { description: Forbidden }
        '404': { description: Lead or booking not found }
        '500': { $ref: '#/components/responses/InternalServerError' }

  /api/v1/leads/{id}/booking/documents:
    post:
      tags: [Leads]
      summary: Add booking document
      description: Upload a client document (PAN, Aadhar, booking agreement, etc.) for the lead's booking. Sales only.
      operationId: addBookingDocument
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [document_name, document_type]
              properties:
                document_name: { type: string, maxLength: 255 }
                document_type: { type: string, enum: [pancard, aadharcard, booking_agreement, passport_photo, electricity_bill, voter_id, driving_license, bank_passbook] }
                document_number: { type: string }
                document_front_photo_url: { type: string }
                document_back_photo_url: { type: string }
                remarks: { type: string }
      responses:
        '201': { description: Document added }
        '403': { description: Not sales or lead not assigned }
        '404': { description: Lead or booking not found }
        '500': { $ref: '#/components/responses/InternalServerError' }
    get:
      tags: [Leads]
      summary: List booking documents
      description: List all documents for the lead's booking. Sales only.
      operationId: listBookingDocuments
