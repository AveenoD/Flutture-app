  # ==================== WhatsApp Messaging ====================
  /api/v1/leads/{id}/whatsapp/send:
    post:
      tags: [WhatsApp Messaging]
      summary: Send WhatsApp message to lead
      description: |
        Send a text, template, or media message to a lead via WhatsApp.
        - Requires an active lead_stage_id (per-stage conversation isolation)
        - Auto-creates conversation for the stage if none exists
        - Non-template messages require a 24h window (lead must have messaged within 24h)
        - Template messages bypass the 24h window
        - Media messages: upload to B2 first via /media/upload-url, then send with object_key as attachment_url
      security: [{BearerAuth: []}]
      parameters:
        - {name: id, in: path, required: true, schema: {type: string, format: uuid}, description: Lead ID}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [lead_stage_id, message_type]
              properties:
                lead_stage_id: {type: string, format: uuid, description: Must be an active stage}
                message_type: {type: string, enum: [text, template, image, document, audio, video]}
                message_text: {type: string, description: Required for text messages. Caption for media.}
                template_name: {type: string, description: Required for template messages}
                template_language: {type: string, example: en_US}
                template_components: {type: array, description: Template component parameters}
                attachment_url: {type: string, description: B2 object key or public URL for media}
                attachment_filename: {type: string, description: Filename for document messages}
      responses:
        '201': {description: Message sent}
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: {type: boolean, example: false}
                  message: {type: string}
                  error_code: {type: string, enum: [STAGE_NOT_ACTIVE, 24H_WINDOW_EXPIRED]}
        '401': {description: Unauthorized}
        '403': {description: Only presales/sales}
        '404': {description: Lead or WA account not found}

  /api/v1/leads/{id}/whatsapp/conversations:
    get:
      tags: [WhatsApp Messaging]
      summary: List conversations for lead
      description: Returns all WhatsApp conversations for a lead (across all stages), with pagination and message counts.
      security: [{BearerAuth: []}]
      parameters:
        - {name: id, in: path, required: true, schema: {type: string, format: uuid}}
        - {name: page, in: query, schema: {type: integer, default: 1}}
        - {name: limit, in: query, schema: {type: integer, default: 20, maximum: 50}}
      responses:
        '200':
          description: Conversations retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      conversations:
                        type: array
                        items:
                          type: object
                          properties:
                            id: {type: string, format: uuid}
                            lead_stage_id: {type: string, format: uuid}
                            status: {type: string, enum: [active, closed]}
                            conversation_started_at: {type: string, format: date-time}
                            last_message_at: {type: string, format: date-time}
                            last_inbound_at: {type: string, format: date-time}
                            message_count: {type: integer}
                      pagination: {type: object}
        '401': {description: Unauthorized}

  /api/v1/leads/{id}/whatsapp/conversations/{conv_id}/messages:
    get:
      tags: [WhatsApp Messaging]
      summary: Get messages for a conversation
      description: Returns paginated messages for a specific conversation (newest first).
      security: [{BearerAuth: []}]
      parameters:
        - {name: id, in: path, required: true, schema: {type: string, format: uuid}, description: Lead ID}
        - {name: conv_id, in: path, required: true, schema: {type: string, format: uuid}, description: Conversation ID}
        - {name: page, in: query, schema: {type: integer, default: 1}}
        - {name: limit, in: query, schema: {type: integer, default: 50, maximum: 100}}
      responses:
        '200':
          description: Messages retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      messages:
                        type: array
                        items:
                          type: object
                          properties:
                            id: {type: string, format: uuid}
                            conversation_id: {type: string, format: uuid}
                            whatsapp_message_id: {type: string}
                            direction: {type: string, enum: [inbound, outbound]}
                            message_type: {type: string, enum: [text, template, image, document, audio, video]}
                            message_text: {type: string}
                            attachment_url: {type: string}
                            attachment_type: {type: string}
                            attachment_filename: {type: string}
                            template_name: {type: string}
                            delivery_status: {type: string, enum: [sent, delivered, read, failed]}
                            sender_user_id: {type: string, format: uuid}
                            sent_at: {type: string, format: date-time}
                      pagination: {type: object}
        '401': {description: Unauthorized}

  /api/v1/leads/{id}/whatsapp/media/upload-url:
    post:
      tags: [WhatsApp Messaging]
      summary: Get presigned upload URL for media
      description: Generate a presigned B2 URL for uploading media files (images, documents, audio, video) to send via WhatsApp.
      security: [{BearerAuth: []}]
      parameters:
        - {name: id, in: path, required: true, schema: {type: string, format: uuid}, description: Lead ID}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [file_extension]
              properties:
                file_extension: {type: string, example: jpg}
      responses:
        '200':
          description: Upload URL generated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      upload_url: {type: string}
                      object_key: {type: string, example: "wa-media/org-uuid/lead-uuid/outbound/uuid.jpg"}
        '401': {description: Unauthorized}
        '403': {description: Only presales/sales}
        '500': {description: B2 storage not configured}

  /api/v1/leads/{id}/whatsapp/live:
    get:
      tags: [WhatsApp Messaging]
      summary: SSE live stream for chat events
      description: |
        Server-Sent Events endpoint for real-time WhatsApp message notifications.
        Events: new_message, status_update. Sends keepalive every 15s.
        Connect with EventSource in browser or SSE client.
      security: [{BearerAuth: []}]
      parameters:
        - {name: id, in: path, required: true, schema: {type: string, format: uuid}, description: Lead ID}
      responses:
        '200':
          description: SSE stream established
          content:
            text/event-stream:
              schema:
                type: string
        '401': {description: Unauthorized}

  # ==================== WhatsApp Templates ====================
  /api/v1/whatsapp/templates:
    get:
      tags: [WhatsApp Templates]
      summary: List approved message templates
      description: Fetches approved WhatsApp message templates from Meta Cloud API for the organization's WABA.
      security: [{BearerAuth: []}]
      responses:
        '200':
          description: Templates retrieved
          content:
