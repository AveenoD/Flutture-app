      security: [{BearerAuth: []}]
      parameters:
        - name: config_id
          in: query
          required: false
          schema: {type: string, format: uuid}
          description: Filter by lead_sourcing_config_id
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
