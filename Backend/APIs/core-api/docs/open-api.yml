  /api/v1/imported-data/import:
    post:
      tags:
        - Imported Data
      summary: Import CSV data and create leads
      description: |
        Upload a CSV file to import leads into the system. The endpoint validates phone numbers,
        checks lead limits, and creates leads with detailed error reporting.
        
        **CSV Format Requirements:**
        - Required columns: name, phone
        - Optional columns: email, city, state, budget_min, budget_max, lead_temperature
        - Max file size: 10MB
        
        **Phone Number Validation:**
        - Numbers with length >= 10 and <= 13 (including +) → saved as is
        - +91XXXXXXXXXX (13 chars) → saved as is (no removal)
        - 91XXXXXXXXXX (12 digits) → saved as is
        - XXXXXXXXXX (10 digits) → saved as is
        - Less than 10 digits → rejected with error
        - More than 13 characters → rejected with error
        
        **Authorization:**
        - GM: Always allowed
        - Manager: Requires 'import_data' permission
      operationId: importData
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - title
                - file
              properties:
                title:
                  type: string
                  minLength: 3
                  maxLength: 255
                  description: Title for this import batch
                  example: "Q1 2024 Lead Import"
                description:
                  type: string
                  maxLength: 1000
                  description: Optional description for this import
                  example: "First batch of imported leads from real estate expo"
                file:
                  type: string
                  format: binary
                  description: CSV file containing lead data
      responses:
        '201':
          description: Data imported successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Data imported successfully"
                  data:
                    $ref: '#/components/schemas/ImportDataResponse'
        '400':
          description: Validation error or lead limit exceeded
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: "LEAD_LIMIT_EXCEEDED: 188 leads available, 195 leads in CSV"
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          description: Permission denied
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: "Permission denied"
                  data:
                    type: object
                    properties:
                      error:
                        type: string
                        example: "import_data permission required"
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/imported-data/{id}/assign-users:
    post:
      tags:
        - Imported Data
      summary: Assign presales users to imported leads
      description: |
        Assigns multiple presales users to all leads from a specific import using round-robin distribution.
        
        **Round-Robin Logic:**
        - If 7 leads and 2 users: User1 gets 4 leads, User2 gets 3 leads
        - If 7 leads and 1 user: User1 gets all 7 leads
        
        **Authorization:**
        - GM: Always allowed
        - Manager: Always allowed
      operationId: assignUsersToImportedData
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Imported data UUID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - user_ids
              properties:
                user_ids:
                  type: array
                  minItems: 1
                  items:
                    type: string
                    format: uuid
                  description: Array of presales user UUIDs
                  example: ["5566716a-ec77-4805-a4d6-ddcacefd4d00"]
      responses:
        '200':
          description: Users assigned successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Users assigned successfully"
                  data:
                    $ref: '#/components/schemas/AssignUsersResponse'
        '400':
          description: Validation error or no valid users/leads found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          description: Imported data not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: "Imported data not found"
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/imported-data/{id}:
    delete:
      tags:
        - Imported Data
      summary: Delete imported data and unqualified leads
      description: |
        Soft deletes the imported data record and all associated leads that are still 'unqualified'.
        Qualified or processed leads are NOT deleted.
        
        **Delete Behavior:**
        - Deletes only leads with status = 'unqualified'
        - All other statuses (called, qualified, visit, etc.) are preserved
        - Both imported_data and leads are soft-deleted (deleted_at timestamp)
        
        **Authorization:**
        - GM: Always allowed
        - Manager: Always allowed
      operationId: deleteImportedData
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Imported data UUID
      responses:
        '200':
          description: Imported data deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Imported data deleted successfully"
                  data:
                    $ref: '#/components/schemas/DeleteImportedDataResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          description: Imported data not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: "Imported data not found"
        '500':
          $ref: '#/components/responses/InternalServerError'

