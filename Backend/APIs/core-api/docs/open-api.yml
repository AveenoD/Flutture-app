                type: object
                properties:
                  data:
                    type: object
                    properties:
                      templates:
                        type: array
                        items:
                          type: object
                          properties:
                            name: {type: string}
                            language: {type: string}
                            status: {type: string}
                            category: {type: string, enum: [MARKETING, UTILITY, AUTHENTICATION]}
                            components: {type: array}
        '401': {description: Unauthorized}
        '404': {description: No active WhatsApp account}

  # ==================== WhatsApp Webhook ====================
  /api/v1/webhook/whatsapp:
    get:
      tags: [WhatsApp Webhook]
      summary: Webhook verification (Meta)
      description: |
        Meta sends a GET request to verify the webhook URL during setup.
        Returns the hub.challenge value if hub.verify_token matches.
      parameters:
        - {name: hub.mode, in: query, required: true, schema: {type: string}}
        - {name: hub.verify_token, in: query, required: true, schema: {type: string}}
        - {name: hub.challenge, in: query, required: true, schema: {type: string}}
      responses:
        '200': {description: Returns hub.challenge}
        '403': {description: Verification failed}
    post:
      tags: [WhatsApp Webhook]
      summary: Receive webhook events (Meta)
      description: |
        Receives incoming WhatsApp messages and delivery status updates from Meta Cloud API.
        Inbound messages are matched to leads by phone and stored in the active-stage conversation.
        Verified via X-Hub-Signature-256 header (HMAC-SHA256 with app secret) when WA_APP_SECRET is set.
        Processes messages async and returns 200 immediately.
        Webhook + save + send + stage-wise flow: see core-api readme, scripts/test_whatsapp_webhook_flow.sh.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                object: {type: string, example: whatsapp_business_account}
                entry: {type: array}
      responses:
        '200': {description: Webhook received}
        '401': {description: Invalid signature}

  /api/v1/projects/{project_id}/addons/{addon_id}:
    get:
      tags: [Addons]
      summary: Get addon by ID (cached)
      security: [{BearerAuth: []}]
      parameters:
        - {name: project_id, in: path, required: true, schema: {type: string, format: uuid}}
        - {name: addon_id, in: path, required: true, schema: {type: string, format: uuid}}
      responses:
        '200': {description: Addon retrieved}
    put:
      tags: [Addons]
      summary: Update addon
      security: [{BearerAuth: []}]
      parameters:
        - {name: project_id, in: path, required: true, schema: {type: string, format: uuid}}
        - {name: addon_id, in: path, required: true, schema: {type: string, format: uuid}}
      responses:
        '200': {description: Updated}
    delete:
      tags: [Addons]
      summary: Delete addon
      security: [{BearerAuth: []}]
      parameters:
        - {name: project_id, in: path, required: true, schema: {type: string, format: uuid}}
        - {name: addon_id, in: path, required: true, schema: {type: string, format: uuid}}
      responses:
        '200': {description: Deleted}

  # ============================================================
  # Lead Sourcing Integration
  # ============================================================

  /api/v1/organization-apis:
    post:
      tags: [Organization APIs]
      summary: Add provider API credentials
      description: Store API credentials for an external lead provider (housing, 99acres, etc.). The api_key and password are stored encrypted; responses return has_api_key/has_password booleans instead of raw values.
      security: [{BearerAuth: []}]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [provider, api_category, auth_type]
              properties:
                provider: {type: string, enum: [meta, google, 99acres, housing, nobroker, magicbricks, whatsapp, ivr]}
                api_category: {type: string, enum: [lead_sourcing, communication]}
                auth_type: {type: string, enum: [api_key, oauth, basic_auth]}
                api_key: {type: string, description: Encryption key / API key for the provider}
                username: {type: string}
                password: {type: string}
                base_endpoint: {type: string, format: uri, description: Provider base URL override}
      responses:
        '201':
          description: Credential created
          content:
            application/json:
              schema: {$ref: '#/components/schemas/OrgAPIResponse'}
        '400': {description: Invalid request}
        '403': {description: Forbidden}
    get:
      tags: [Organization APIs]
      summary: List API credentials for current organization
      security: [{BearerAuth: []}]
      responses:
        '200':
          description: List of credentials
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: {type: boolean}
                  data:
                    type: array
                    items: {$ref: '#/components/schemas/OrgAPIResponse'}

  /api/v1/organization-apis/{id}:
    get:
      tags: [Organization APIs]
      summary: Get one API credential
      security: [{BearerAuth: []}]
      parameters:
        - {name: id, in: path, required: true, schema: {type: string, format: uuid}}
      responses:
        '200':
          description: Credential details
          content:
            application/json:
              schema: {$ref: '#/components/schemas/OrgAPIResponse'}
        '404': {description: Not found}
    put:
      tags: [Organization APIs]
      summary: Update API credential
      security: [{BearerAuth: []}]
      parameters:
        - {name: id, in: path, required: true, schema: {type: string, format: uuid}}
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                api_key: {type: string}
                username: {type: string}
                password: {type: string}
                base_endpoint: {type: string, format: uri}
                status: {type: string, enum: [active, disabled, error]}
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema: {$ref: '#/components/schemas/OrgAPIResponse'}
    delete:
      tags: [Organization APIs]
      summary: Delete API credential (cascades to sourcing configs and sync logs)
      security: [{BearerAuth: []}]
      parameters:
        - {name: id, in: path, required: true, schema: {type: string, format: uuid}}
      responses:
        '200': {description: Deleted}
        '404': {description: Not found}

  /api/v1/lead-sourcing-configs:
    post:
      tags: [Lead Sourcing Configs]
      summary: Create lead sourcing config with field mapping
      description: |
        Creates a polling/sync configuration for an organization API.
        `mapping_config` is a JSON object with:
        - `response_leads_path` — dot-path to the leads array in the provider response (e.g. "data")
        - `field_map` — object mapping internal fields to provider fields: name, phone, email, city, state, budget_min, budget_max, source_detail, external_project_id, external_lead_id
        - `provider_config` — provider-specific settings (e.g. {"profile_id": "24039743"} for Housing)
      security: [{BearerAuth: []}]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [org_api_id, sync_mode, lead_source_tag, mapping_config]
              properties:
                org_api_id: {type: string, format: uuid}
                sync_mode: {type: string, enum: [realtime, scheduled]}
                sync_interval_min: {type: integer, minimum: 1, description: Polling interval in minutes (default 60)}
                lead_source_tag: {type: string, enum: [99acres, meta_ads, housing, nobroker, magicbricks, google_ads]}
                mapping_config:
                  type: object
                  properties:
                    response_leads_path: {type: string, example: data}
                    field_map:
                      type: object
                      additionalProperties: {type: string}
                      example: {name: lead_name, phone: lead_phone, email: lead_email, external_project_id: project_id, external_lead_id: lead_date}
                    provider_config:
                      type: object
                      additionalProperties: {type: string}
                      example: {profile_id: "24039743"}
      responses:
        '201':
          description: Config created
          content:
            application/json:
              schema: {$ref: '#/components/schemas/LeadSourcingConfigResponse'}
    get:
      tags: [Lead Sourcing Configs]
      summary: List sourcing configs for current organization
      security: [{BearerAuth: []}]
      responses:
        '200':
          description: List of configs
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: {type: boolean}
                  data:
                    type: array
                    items: {$ref: '#/components/schemas/LeadSourcingConfigResponse'}

  /api/v1/lead-sourcing-configs/{id}:
    get:
      tags: [Lead Sourcing Configs]
      summary: Get one sourcing config
      security: [{BearerAuth: []}]
      parameters:
        - {name: id, in: path, required: true, schema: {type: string, format: uuid}}
      responses:
        '200':
          content:
            application/json:
              schema: {$ref: '#/components/schemas/LeadSourcingConfigResponse'}
    put:
      tags: [Lead Sourcing Configs]
      summary: Update sourcing config (interval, mapping, sync_mode)
      security: [{BearerAuth: []}]
      parameters:
        - {name: id, in: path, required: true, schema: {type: string, format: uuid}}
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                sync_mode: {type: string, enum: [realtime, scheduled]}
                sync_interval_min: {type: integer, minimum: 1}
                mapping_config: {type: object}
      responses:
        '200':
          content:
            application/json:
              schema: {$ref: '#/components/schemas/LeadSourcingConfigResponse'}
    delete:
      tags: [Lead Sourcing Configs]
      summary: Delete sourcing config
      security: [{BearerAuth: []}]
      parameters:
        - {name: id, in: path, required: true, schema: {type: string, format: uuid}}
      responses:
        '200': {description: Deleted}

  /api/v1/lead-sourcing-configs/{id}/sync-now:
    post:
      tags: [Lead Sourcing Configs]
      summary: Trigger immediate sync for a config
      description: Runs a one-off fetch+map+insert cycle right now and returns the result (leads_fetched, leads_created, leads_skipped).
      security: [{BearerAuth: []}]
      parameters:
        - {name: id, in: path, required: true, schema: {type: string, format: uuid}}
      responses:
        '200':
          description: Sync completed
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: {type: boolean}
                  data:
                    type: object
                    properties:
                      leads_fetched: {type: integer}
                      leads_created: {type: integer}
                      leads_skipped: {type: integer}
                      error_message: {type: string}

  /api/v1/external-project-mappings:
    post:
      tags: [External Project Mappings]
      summary: Map an external provider project ID to an internal project
      security: [{BearerAuth: []}]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [provider, external_project_id]
              properties:
                provider: {type: string, enum: [meta, google, 99acres, housing, nobroker, magicbricks, whatsapp, ivr]}
                external_project_id: {type: string, example: "288969"}
                external_project_name: {type: string, example: Pawa Blossom}
                internal_project_id: {type: string, format: uuid, nullable: true, description: Internal project UUID (null if unmapped)}
      responses:
        '201':
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ExternalProjectMappingResponse'}
        '409': {description: Duplicate mapping for this org+provider+external_project_id}
    get:
      tags: [External Project Mappings]
      summary: List project mappings for current organization
      security: [{BearerAuth: []}]
      parameters:
        - name: provider
          in: query
          required: false
          schema: {type: string}
          description: Filter by provider (e.g. housing)
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: {type: boolean}
                  data:
                    type: array
                    items: {$ref: '#/components/schemas/ExternalProjectMappingResponse'}

  /api/v1/external-project-mappings/{id}:
    put:
      tags: [External Project Mappings]
      summary: Update project mapping
      security: [{BearerAuth: []}]
      parameters:
        - {name: id, in: path, required: true, schema: {type: string, format: uuid}}
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                external_project_name: {type: string}
                internal_project_id: {type: string, format: uuid, nullable: true}
      responses:
        '200':
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ExternalProjectMappingResponse'}
    delete:
      tags: [External Project Mappings]
      summary: Delete project mapping
      security: [{BearerAuth: []}]
      parameters:
        - {name: id, in: path, required: true, schema: {type: string, format: uuid}}
      responses:
        '200': {description: Deleted}

  /api/v1/lead-sync-logs:
    get:
