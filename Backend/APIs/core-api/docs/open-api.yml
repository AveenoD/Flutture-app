  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: "JWT token obtained from login endpoint. Include as \"Authorization: Bearer {token}\""

  # ============================================
  # PROJECT MANAGEMENT ENDPOINTS
  # ============================================
  
  /api/v1/projects:
    post:
      tags: [Projects]
      summary: Create new project
      description: Create a real estate project with subscription limit check. Requires manage_projects permission for managers.
      security: [{BearerAuth: []}]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [project_title, project_type]
              properties:
                project_title: {type: string}
                project_type: {type: string, enum: [residential, commercial, educational, government, mixed]}
                city: {type: string}
                state: {type: string}
                amenities: {type: array, items: {type: string}}
      responses:
        '201': {description: Project created}
        '400': {description: Subscription limit exceeded}
        '403': {description: Permission denied}
    get:
      tags: [Projects]
      summary: List projects with filters
      security: [{BearerAuth: []}]
      parameters:
        - {name: type, in: query, schema: {type: string}}
        - {name: city, in: query, schema: {type: string}}
        - {name: status, in: query, schema: {type: string}}
        - name: mine
          in: query
          description: When set to 1 or true, sales users only — restrict to projects whose id is in the caller's users_sales.project_assigned_ids.
          schema: {type: string, enum: ["1", "true"]}
        - {name: page, in: query, schema: {type: integer, default: 1}}
        - {name: limit, in: query, schema: {type: integer, default: 20}}
      responses:
        '200': {description: Projects retrieved}
        '403': {description: mine=1 used by a non-sales user}

  /api/v1/projects/search:
    get:
      tags: [Projects]
      summary: Search projects (full-text)
      security: [{BearerAuth: []}]
      parameters:
        - {name: q, in: query, required: true, schema: {type: string}}
        - {name: limit, in: query, schema: {type: integer, default: 20}}
      responses:
        '200': {description: Search results}

  /api/v1/projects/{id}:
    get:
      tags: [Projects]
      summary: Get project by ID (cached)
      security: [{BearerAuth: []}]
      parameters:
        - {name: id, in: path, required: true, schema: {type: string, format: uuid}}
      responses:
        '200': {description: Project retrieved}
        '404': {description: Not found}
    put:
      tags: [Projects]
      summary: Update project (invalidates cache)
      security: [{BearerAuth: []}]
      parameters:
        - {name: id, in: path, required: true, schema: {type: string, format: uuid}}
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                project_title: {type: string}
                city: {type: string}
      responses:
        '200': {description: Updated}
        '403': {description: Permission denied}
    delete:
      tags: [Projects]
      summary: Delete project (soft delete)
      security: [{BearerAuth: []}]
      parameters:
        - {name: id, in: path, required: true, schema: {type: string, format: uuid}}
      responses:
        '200': {description: Deleted}

  /api/v1/projects/{id}/stats:
    get:
      tags: [Projects]
      summary: Get project statistics (cached)
      security: [{BearerAuth: []}]
      parameters:
        - {name: id, in: path, required: true, schema: {type: string, format: uuid}}
      responses:
        '200': {description: Statistics retrieved}

  /api/v1/projects/{project_id}/units:
    post:
      tags: [Units]
      summary: Create unit (with limit check)
      security: [{BearerAuth: []}]
      parameters:
        - {name: project_id, in: path, required: true, schema: {type: string, format: uuid}}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, unit_type]
              properties:
                name: {type: string}
                floor: {type: integer}
                unit_type: {type: string, enum: [flat, penthouse, plot, shop, row_house, bungalow]}
                base_price: {type: number}
                status: {type: string, default: available}
      responses:
        '201': {description: Unit created}
        '400': {description: Unit limit exceeded}
    get:
      tags: [Units]
      summary: List units with filters
      security: [{BearerAuth: []}]
      parameters:
        - {name: project_id, in: path, required: true, schema: {type: string, format: uuid}}
        - {name: floor, in: query, schema: {type: integer}}
        - {name: floor_min, in: query, schema: {type: integer}}
        - {name: floor_max, in: query, schema: {type: integer}}
        - {name: price_min, in: query, schema: {type: number}}
        - {name: price_max, in: query, schema: {type: number}}
        - {name: status, in: query, schema: {type: string}}
      responses:
        '200': {description: Units retrieved}

  /api/v1/projects/{project_id}/units/bulk:
    post:
      tags: [Units]
      summary: Bulk create units
      security: [{BearerAuth: []}]
      parameters:
        - {name: project_id, in: path, required: true, schema: {type: string, format: uuid}}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                units: {type: array, items: {type: object}}
      responses:
        '201': {description: Units created}

  /api/v1/projects/{project_id}/units/{unit_id}:
    get:
      tags: [Units]
      summary: Get unit by ID (cached)
      security: [{BearerAuth: []}]
      parameters:
        - {name: project_id, in: path, required: true, schema: {type: string, format: uuid}}
        - {name: unit_id, in: path, required: true, schema: {type: string, format: uuid}}
      responses:
        '200': {description: Unit retrieved}
    put:
      tags: [Units]
      summary: Update unit (invalidates cache)
      security: [{BearerAuth: []}]
      parameters:
        - {name: project_id, in: path, required: true, schema: {type: string, format: uuid}}
        - {name: unit_id, in: path, required: true, schema: {type: string, format: uuid}}
      responses:
        '200': {description: Updated}
    delete:
      tags: [Units]
      summary: Delete unit
      security: [{BearerAuth: []}]
      parameters:
        - {name: project_id, in: path, required: true, schema: {type: string, format: uuid}}
        - {name: unit_id, in: path, required: true, schema: {type: string, format: uuid}}
      responses:
        '200': {description: Deleted}

  /api/v1/projects/{project_id}/addons:
    post:
      tags: [Addons]
      summary: Create addon
      security: [{BearerAuth: []}]
      parameters:
        - {name: project_id, in: path, required: true, schema: {type: string, format: uuid}}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title, category, price]
              properties:
                title: {type: string}
                category: {type: string, enum: [kitchen, flooring, electrical, other]}
                price: {type: number}
                status: {type: string, default: active}
      responses:
        '201': {description: Addon created}
    get:
      tags: [Addons]
      summary: List addons with filters
      security: [{BearerAuth: []}]
      parameters:
        - {name: project_id, in: path, required: true, schema: {type: string, format: uuid}}
        - {name: category, in: query, schema: {type: string}}
        - {name: price_min, in: query, schema: {type: number}}
        - {name: price_max, in: query, schema: {type: number}}
      responses:
        '200': {description: Addons retrieved}

  # ============================================
  # Call APIs (Phase 1 - Mobile)
  # ============================================

  /api/v1/leads/{id}/calls:
    post:
      tags: [Calls]
      summary: Initiate a call record
      description: |
        Creates a new call record for the lead with status 'initiated'. Returns the call_id and lead's phone number.
        Presales or Sales only. The mobile app should then open the native dialer.
      security: [{BearerAuth: []}]
      parameters:
        - {name: id, in: path, required: true, schema: {type: string, format: uuid}, description: Lead ID}
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                lead_stage_id:
                  type: string
                  format: uuid
                  description: Optional stage ID to associate the call with
      responses:
        '201':
          description: Call initiated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: {type: boolean, example: true}
                  message: {type: string, example: Call initiated}
                  data:
                    type: object
                    properties:
                      call:
                        type: object
                        properties:
                          call_id: {type: string, format: uuid}
                          lead_phone: {type: string, example: "+919876543210"}
                          status: {type: string, example: initiated}
        '401': {description: Unauthorized}
        '403': {description: Forbidden - only presales/sales can initiate calls}
        '404': {description: Lead not found}
    get:
      tags: [Calls]
      summary: List calls for a lead
      description: |
        Returns paginated list of all calls for a lead, ordered by created_at DESC. All authenticated roles can read.
        When a call has a recording, `recording_url` is returned as a **presigned HTTPS download URL** (1-hour expiry)
        rather than the raw B2 object key, so clients can stream the audio directly.
      security: [{BearerAuth: []}]
      parameters:
        - {name: id, in: path, required: true, schema: {type: string, format: uuid}, description: Lead ID}
        - {name: page, in: query, schema: {type: integer, default: 1}}
        - {name: limit, in: query, schema: {type: integer, default: 20, maximum: 100}}
      responses:
        '200':
          description: Calls retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: {type: boolean}
                  data:
                    type: object
                    properties:
                      calls:
                        type: array
                        items: {$ref: '#/components/schemas/CallDetail'}
                      pagination: {$ref: '#/components/schemas/PaginationInfo'}
        '401': {description: Unauthorized}

  /api/v1/leads/{id}/calls/{call_id}:
    get:
      tags: [Calls]
      summary: Get single call detail
      description: |
        Returns full call detail including recording URL, duration, outcome, AI fields. All authenticated roles can read.
        When a recording exists, `recording_url` is a **presigned HTTPS download URL** (1-hour expiry) — ready to
        stream directly in `just_audio` or any HTTP audio player. The raw B2 object key is never returned to clients.
      security: [{BearerAuth: []}]
      parameters:
        - {name: id, in: path, required: true, schema: {type: string, format: uuid}, description: Lead ID}
        - {name: call_id, in: path, required: true, schema: {type: string, format: uuid}, description: Call ID}
      responses:
        '200':
          description: Call retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: {type: boolean}
                  data:
                    type: object
                    properties:
                      call: {$ref: '#/components/schemas/CallDetail'}
        '401': {description: Unauthorized}
        '404': {description: Call not found}
    patch:
      tags: [Calls]
      summary: Update call metadata or outcome
      description: |
        Updates call fields. Used twice in the flow:
        1. After recording upload: send recording_url, recording_duration, call_started_at, call_ended_at, call_status
        2. Later when user views lead: send call_outcome
        Presales or Sales only.
      security: [{BearerAuth: []}]
      parameters:
        - {name: id, in: path, required: true, schema: {type: string, format: uuid}, description: Lead ID}
        - {name: call_id, in: path, required: true, schema: {type: string, format: uuid}, description: Call ID}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                call_status:
                  type: string
                  enum: [initiated, ringing, answered, missed, failed, rejected]
                call_started_at: {type: string, format: date-time}
                call_answered_at: {type: string, format: date-time}
                call_ended_at: {type: string, format: date-time}
                recording_url: {type: string, description: "B2 object key from the upload-url response (e.g. recordings/org/lead/call.m4a). Stored as object key; all GET responses return a presigned HTTPS URL instead."}
                recording_duration: {type: integer, description: Duration in seconds}
                call_outcome:
                  type: string
                  enum: [interested, not_interested, follow_up, wrong_number]
      responses:
        '200':
          description: Call updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: {type: boolean}
                  data:
                    type: object
                    properties:
                      call: {$ref: '#/components/schemas/CallDetail'}
        '400': {description: No fields to update or invalid timestamp}
        '401': {description: Unauthorized}
        '403': {description: Forbidden - only presales/sales can update calls}
        '404': {description: Call not found}

  /api/v1/leads/{id}/calls/{call_id}/upload-url:
    post:
      tags: [Calls]
      summary: Get presigned upload URL for call recording
      description: |
        Generates a presigned PUT URL for uploading a call recording to Backblaze B2.
        The Flutter app uploads the audio file directly to B2 using this URL, then sends the
        resulting recording_url back via PATCH. Presales or Sales only.
        Object key pattern: recordings/{org_id}/{lead_id}/{call_id}.{ext}
      security: [{BearerAuth: []}]
      parameters:
        - {name: id, in: path, required: true, schema: {type: string, format: uuid}, description: Lead ID}
        - {name: call_id, in: path, required: true, schema: {type: string, format: uuid}, description: Call ID}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [file_extension]
              properties:
                file_extension:
                  type: string
                  example: m4a
                  description: File extension for the recording (e.g. m4a, mp3, wav)
      responses:
        '200':
          description: Upload URL generated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: {type: boolean}
                  data:
                    type: object
                    properties:
                      upload_url: {type: string, description: Presigned PUT URL (expires in 1 hour)}
                      object_key: {type: string, example: "recordings/org-uuid/lead-uuid/call-uuid.m4a"}
        '400': {description: file_extension is required}
        '401': {description: Unauthorized}
        '403': {description: Forbidden - only presales/sales can upload recordings}
        '500': {description: B2 storage not configured}

