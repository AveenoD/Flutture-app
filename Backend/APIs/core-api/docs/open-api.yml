                display_phone_number: {type: string, example: "+919876543210"}
                business_account_id: {type: string, example: "123456789"}
                access_token: {type: string, description: Meta System User Token}
                webhook_verify_token: {type: string}
                app_secret: {type: string, description: Meta App Secret for webhook signature verification}
      responses:
        '201': {description: WhatsApp account created}
        '400': {description: Missing required fields}
        '401': {description: Unauthorized}
        '403': {description: Only manager/gm can manage WA accounts}
    get:
