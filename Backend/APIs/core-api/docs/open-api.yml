components:
  schemas:
    OnboardRequest:
      type: object
      required:
        - organization
        - general_manager
      properties:
        organization:
          $ref: '#/components/schemas/OrganizationRequest'
        general_manager:
          $ref: '#/components/schemas/GeneralManagerRequest'

    OrganizationRequest:
      type: object
      required:
        - name
        - email
        - type
        - phone
        - address
        - city
        - state
        - country
        - pincode
        - company_size
        - website
        - tax_id
        - gstin
      properties:
        name:
          type: string
          minLength: 3
          maxLength: 255
          example: "ABC Builders"
        email:
          type: string
          format: email
          example: "contact@abcbuilders.com"
        type:
          type: string
          enum: [builder, broker, agency]
          example: "builder"
        phone:
          type: string
          example: "+919876543210"
        address:
          type: string
          minLength: 3
          example: "123 Main Street, Andheri"
        city:
          type: string
          minLength: 3
          maxLength: 100
          example: "Mumbai"
        state:
          type: string
          minLength: 3
          maxLength: 100
          example: "Maharashtra"
        country:
          type: string
          default: "India"
          example: "India"
        pincode:
          type: string
          pattern: '^\d{6}$'
          example: "400001"
        company_size:
          type: string
          enum: [small, medium, large, enterprise]
          example: "medium"
        website:
          type: string
          format: uri
          example: "https://abcbuilders.com"
        tax_id:
          type: string
          minLength: 3
          maxLength: 100
          example: "TAX123456"
        gstin:
          type: string
          pattern: '^[A-Z0-9]{15}$'
          description: GSTIN must be exactly 15 characters, alphanumeric uppercase
          example: "27ABAFB0749E1ZT"

    GeneralManagerRequest:
      type: object
      required:
        - name
        - email
        - phone
        - password
        - gender
        - dob
      properties:
        name:
          type: string
          minLength: 3
          maxLength: 255
          example: "John Doe"
        email:
          type: string
          format: email
          example: "john.doe@abcbuilders.com"
        phone:
          type: string
          example: "+919876543211"
        password:
          type: string
          format: password
          minLength: 8
          description: Must contain at least one uppercase letter, one lowercase letter, and one number
          example: "SecurePass123!"
        gender:
          type: string
          enum: [male, female, other]
          example: "male"
        dob:
          type: string
          format: date
          pattern: '^\d{4}-\d{2}-\d{2}$'
          description: Date of birth in YYYY-MM-DD format, must be in the past
          example: "1990-01-15"
        employee_id:
          type: string
          minLength: 3
          maxLength: 50
          example: "EMP001"
        avatar_url:
          type: string
          format: uri
          nullable: true
          example: "https://example.com/avatar.jpg"

    Organization:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        email:
          type: string
          format: email
        phone:
          type: string
          nullable: true
        address:
          type: string
        city:
          type: string
        state:
          type: string
        country:
          type: string
        pincode:
          type: string
        type:
          type: string
          enum: [builder, broker, agency]
        company_size:
          type: string
          enum: [small, medium, large, enterprise]
          nullable: true
        status:
          type: string
          enum: [active, inactive, suspended, trial]
        logo_url:
          type: string
          nullable: true
        website:
          type: string
        tax_id:
          type: string
        gstin:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        deleted_at:
          type: string
          format: date-time
          nullable: true

    GeneralManager:
      type: object
      properties:
        id:
          type: string
          format: uuid
        organization_id:
          type: string
          format: uuid
        name:
          type: string
        phone:
          type: string
        gender:
          type: string
          enum: [male, female, other]
        dob:
          type: string
          format: date
          nullable: true
        email:
          type: string
          format: email
        avatar_url:
          type: string
          nullable: true
        employee_id:
          type: string
          nullable: true
        team_id:
          type: string
          format: uuid
          nullable: true
        permissions:
          type: array
          items:
            type: string
        status:
          type: string
          enum: [active, inactive, suspended, on_leave]
        last_login_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        deleted_at:
          type: string
          format: date-time
          nullable: true

    OnboardResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: "Organization and General Manager created successfully"
        data:
          type: object
          properties:
            organization:
              $ref: '#/components/schemas/Organization'
            general_manager:
              $ref: '#/components/schemas/GeneralManager'

    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
          example: "Validation failed"
        errors:
          type: object
          additionalProperties:
            type: string

    ConflictResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
        error_code:
          type: string
          enum: [ORGANIZATION_EXISTS, GM_EXISTS]

    LeadResponse:
      type: object
      description: Lead in list or get-by-id response
      properties:
        id:
          type: string
          format: uuid
        organization_id:
          type: string
          format: uuid
        name:
          type: string
        phone:
          type: string
        email:
          type: string
          nullable: true
        city:
          type: string
          nullable: true
        state:
          type: string
          nullable: true
        lead_temperature:
          type: string
          enum: [veryhot, hot, warm, cold]
        status:
          type: string
          enum: [unqualified, called, qualified, visit, negotiation, deal, dropped, rejected]
        stage:
          type: string
          nullable: true
          enum: [qualification, communication, site_visit, negotiation, booking]
        assigned_to_user_id:
          type: string
          format: uuid
          nullable: true
        assigned_to_user_type:
          type: string
          nullable: true
          enum: [presales, sales, manager]
        assigned_at:
          type: string
          format: date-time
          nullable: true
        presales_user_id:
          type: string
          format: uuid
          nullable: true
          description: Presales who owned the lead at handoff (set when first sales assignment happens). Presales can see lead read-only up to stage 3.
        sales_user_id:
          type: string
          format: uuid
          nullable: true
          description: Sales person assigned (pending or accepted). Set when property visit is created and sales routing runs.
        sales_accepted_at:
          type: string
          format: date-time
          nullable: true
          description: When sales accepted the lead. Null = not accepted; "Accepted by sales" means this is set.
        priority:
          type: string
          nullable: true
          enum: [low, medium, high, urgent]
        budget_min:
          type: number
          nullable: true
        budget_max:
          type: number
          nullable: true
        source:
          type: string
          nullable: true
        project_id:
          type: string
          format: uuid
          nullable: true
          description: Project the lead is interested in
        project_title:
          type: string
          nullable: true
          description: Property/project name when project_id is set
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    PresalesUserSummary:
      type: object
      description: Presales user who managed the lead (for lead summary)
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        email:
          type: string
        phone:
          type: string

    ProjectSummary:
      type: object
      description: Minimal project info for interested property in lead summary
      properties:
        project_id:
          type: string
          format: uuid
        project_title:
          type: string

    LeadSummaryResponse:
      type: object
      description: Response for GET /leads/:id/summary (sales only)
      properties:
        lead:
          $ref: '#/components/schemas/LeadResponse'
        presales_user:
          $ref: '#/components/schemas/PresalesUserSummary'
          nullable: true
        recent_calls:
          type: array
          items:
            $ref: '#/components/schemas/StageCallDetail'
        whatsapp_conversations:
          type: array
          items:
            $ref: '#/components/schemas/WhatsAppConversationItem'
        stage_remarks:
          type: array
          items:
            $ref: '#/components/schemas/StageRemarkItem'
        interested_property:
          $ref: '#/components/schemas/ProjectSummary'
          nullable: true

    LeadStatsResponse:
      type: object
      description: Lead stats (calls, messages sent, site visits done, calling hours)
      properties:
        total_calls_made:
          type: integer
          description: Count of calls on user's assigned lead(s)
        message_sent:
          type: integer
          description: Count of outbound WhatsApp messages
        site_visit_done:
          type: integer
          description: Count of completed property visits
        calling_hour:
          type: string
          example: "3:45 hrs"
          description: Total call duration formatted as H:MM hrs
        calling_hour_seconds:
          type: integer
          description: Total call duration in seconds

    RejectionReasonItem:
      type: object
      description: One Q&A in rejection reasons (with question_text from rejection_questions)
      properties:
        question_id:
          type: string
          format: uuid
        question_text:
          type: string
          description: From rejection_questions
        answer:
          type: string
        category:
          type: string
          description: From rejection_questions (e.g. budget, area)

    RejectedLeadRejectionInfo:
      type: object
      properties:
        rejection_id:
          type: string
          format: uuid
        rejected_at:
          type: string
          format: date-time
        rejected_by_user_id:
          type: string
          format: uuid
          nullable: true
        rejected_by_user_type:
          type: string
          enum: [presales, sales]
        questions_response:
          type: array
          items:
            $ref: '#/components/schemas/RejectionReasonItem'
        ai_summary:
          type: string
          nullable: true
        ai_bullet_points:
          type: array
          items:
            type: string

    RejectedLeadItem:
      type: object
      description: Rejected lead with rejection reasons (GET /leads/rejected)
      properties:
        lead:
          $ref: '#/components/schemas/LeadResponse'
        rejection:
          $ref: '#/components/schemas/RejectedLeadRejectionInfo'

    RejectLeadRequest:
      type: object
      required:
        - questions_response
      properties:
        questions_response:
          type: array
          minItems: 1
          items:
            type: object
            required:
              - question_id
              - answer
            properties:
              question_id:
                type: string
                format: uuid
              answer:
                type: string
        ai_summary:
          type: string
          nullable: true
        ai_bullet_points:
          type: array
          items:
            type: string

    ForwardStageRequest:
      type: object
      required:
        - next_stage
      description: Body for POST /leads/:id/forward-stage
      properties:
        next_stage:
          type: string
          enum: [communication, property_visit, negotiation, booking]
        remarks:
          type: string
          nullable: true

    QualifyLeadRequest:
