<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>BTCR PPT - Index</title>
    <style>
      :root {
        --bg: #07070c;
        --panel: rgba(255, 255, 255, 0.06);
        --panel2: rgba(255, 255, 255, 0.04);
        --border: rgba(255, 255, 255, 0.12);
        --text: rgba(255, 255, 255, 0.92);
        --muted: rgba(255, 255, 255, 0.6);
        --accent: #38bdf8;
        --accent2: #a855f7;
        --shadow: 0 18px 60px rgba(0, 0, 0, 0.5);
        --radius: 14px;
      }

      * { box-sizing: border-box; }
      html, body { height: 100%; }
      body {
        margin: 0;
        background:
          radial-gradient(1200px 600px at 20% 10%, rgba(56, 189, 248, 0.18), transparent 55%),
          radial-gradient(900px 500px at 85% 20%, rgba(168, 85, 247, 0.16), transparent 55%),
          radial-gradient(900px 700px at 40% 95%, rgba(244, 114, 182, 0.10), transparent 55%),
          var(--bg);
        color: var(--text);
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji";
        overflow: hidden;
      }

      .app {
        height: 100%;
        display: grid;
        grid-template-columns: 320px 1fr;
      }

      .sidebar {
        border-right: 1px solid var(--border);
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.04), rgba(255, 255, 255, 0.02));
        padding: 16px 14px;
        display: flex;
        flex-direction: column;
        gap: 12px;
        min-width: 260px;
      }

      .brand {
        padding: 12px;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        background: var(--panel);
        box-shadow: var(--shadow);
      }
      .brand .title {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        font-weight: 700;
        letter-spacing: 0.3px;
      }
      .pill {
        font-size: 12px;
        padding: 4px 10px;
        border-radius: 999px;
        border: 1px solid rgba(56, 189, 248, 0.35);
        color: rgba(198, 241, 255, 0.95);
        background: rgba(56, 189, 248, 0.10);
        white-space: nowrap;
      }
      .hint {
        margin-top: 8px;
        font-size: 12px;
        color: var(--muted);
        line-height: 1.45;
      }

      .controls {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }
      button {
        appearance: none;
        border: 1px solid var(--border);
        background: rgba(255, 255, 255, 0.04);
        color: var(--text);
        border-radius: 12px;
        padding: 10px 12px;
        cursor: pointer;
        transition: transform 120ms ease, background 120ms ease, border-color 120ms ease;
        font-weight: 600;
      }
      button:hover { background: rgba(255, 255, 255, 0.06); border-color: rgba(255, 255, 255, 0.2); }
      button:active { transform: translateY(1px); }
      button:disabled { opacity: 0.5; cursor: not-allowed; }
      .btn-accent {
        border-color: rgba(56, 189, 248, 0.35);
        background: linear-gradient(180deg, rgba(56, 189, 248, 0.18), rgba(56, 189, 248, 0.08));
      }
      .btn-accent:hover {
        border-color: rgba(56, 189, 248, 0.55);
        background: linear-gradient(180deg, rgba(56, 189, 248, 0.22), rgba(56, 189, 248, 0.10));
      }

      .list {
        flex: 1;
        overflow: auto;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        background: var(--panel2);
        padding: 6px;
      }
      .list::-webkit-scrollbar { width: 10px; }
      .list::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.12); border-radius: 999px; }
      .list::-webkit-scrollbar-track { background: rgba(255, 255, 255, 0.04); border-radius: 999px; }

      .slide-link {
        width: 100%;
        text-align: left;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        padding: 10px 10px;
        border-radius: 12px;
        border: 1px solid transparent;
        background: transparent;
        cursor: pointer;
        color: var(--text);
        font-weight: 600;
      }
      .slide-link small { color: var(--muted); font-weight: 600; }
      .slide-link:hover { background: rgba(255, 255, 255, 0.05); }
      .slide-link[aria-current="true"] {
        background: linear-gradient(90deg, rgba(56, 189, 248, 0.16), rgba(168, 85, 247, 0.10));
        border-color: rgba(56, 189, 248, 0.25);
        box-shadow: 0 0 0 1px rgba(56, 189, 248, 0.18) inset;
      }

      .main {
        height: 100%;
        display: grid;
        grid-template-rows: auto 1fr;
        padding: 16px;
        gap: 12px;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 12px 14px;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        background: rgba(255, 255, 255, 0.04);
        box-shadow: var(--shadow);
      }
      .topbar .meta {
        display: flex;
        flex-direction: column;
        gap: 4px;
        min-width: 200px;
      }
      .topbar .meta .kicker {
        color: var(--muted);
        font-size: 12px;
        letter-spacing: 0.4px;
      }
      .topbar .meta .now {
        font-weight: 750;
        letter-spacing: 0.2px;
      }
      .topbar .actions {
        display: flex;
        gap: 10px;
        align-items: center;
        justify-content: flex-end;
        flex-wrap: wrap;
      }

      .frame-wrap {
        border: 1px solid var(--border);
        border-radius: calc(var(--radius) + 6px);
        background: rgba(0, 0, 0, 0.22);
        box-shadow: var(--shadow);
        overflow: hidden;
        position: relative;
        padding: 18px 18px 26px 18px;
      }
      .frame-stage {
        width: 1280px;
        height: 720px;
        position: absolute;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%) scale(var(--scale, 1));
        transform-origin: center;
        border-radius: 10px;
        overflow: hidden;
        background: #000;
      }
      iframe {
        width: 100%;
        height: 100%;
        border: 0;
        background: #000;
        display: block;
      }

      .note {
        color: var(--muted);
        font-size: 12px;
      }

      @media (max-width: 980px) {
        body { overflow: auto; }
        .app { grid-template-columns: 1fr; grid-template-rows: auto 1fr; }
        .sidebar { border-right: 0; border-bottom: 1px solid var(--border); }
        .frame-wrap { padding: 10px; }
        .frame-stage {
          position: relative;
          left: auto;
          top: auto;
          transform: none !important;
          width: 100%;
          height: 70vh;
        }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <aside class="sidebar">
        <div class="brand">
          <div class="title">
            <div>BTCR Slides</div>
            <div class="pill" id="pill">Slide 1 / 12</div>
          </div>
          <div class="hint">
            Use <b>Prev/Next</b> buttons, <b>←/→</b> keys, or swipe on the slide area.
          </div>
        </div>

        <div class="controls">
          <button class="btn-accent" id="prevBtn" type="button">← Prev</button>
          <button class="btn-accent" id="nextBtn" type="button">Next →</button>
        </div>

        <div class="list" id="list" role="listbox" aria-label="Slides list"></div>
        <div class="note">Tip: click any slide to jump.</div>
      </aside>

      <main class="main">
        <div class="topbar">
          <div class="meta">
            <div class="kicker">Currently viewing</div>
            <div class="now" id="nowTitle">Slide 1</div>
          </div>
          <div class="actions">
            <button id="openTabBtn" type="button">Open in new tab</button>
            <button id="reloadBtn" type="button">Reload slide</button>
          </div>
        </div>

        <div class="frame-wrap" id="frameWrap">
          <div class="frame-stage" id="frameStage">
            <iframe id="frame" title="Slide preview" src="Slide1.html" referrerpolicy="no-referrer"></iframe>
          </div>
        </div>
      </main>
    </div>

    <script>
      const SLIDES = Array.from({ length: 12 }, (_, i) => ({
        index: i + 1,
        file: `Slide${i + 1}.html`,
        label: `Slide ${i + 1}`,
      }));

      const STORAGE_KEY = "btcr_ppt_current_slide";

      const listEl = document.getElementById("list");
      const frame = document.getElementById("frame");
      const prevBtn = document.getElementById("prevBtn");
      const nextBtn = document.getElementById("nextBtn");
      const pill = document.getElementById("pill");
      const nowTitle = document.getElementById("nowTitle");
      const reloadBtn = document.getElementById("reloadBtn");
      const openTabBtn = document.getElementById("openTabBtn");
      const frameWrap = document.getElementById("frameWrap");
      const frameStage = document.getElementById("frameStage");

      let current = 1;

      function clamp(n, min, max) {
        return Math.max(min, Math.min(max, n));
      }

      function setCurrent(idx) {
        current = clamp(idx, 1, SLIDES.length);
        const slide = SLIDES[current - 1];
        frame.src = slide.file;
        nowTitle.textContent = slide.label;
        pill.textContent = `${slide.label} / ${SLIDES.length}`;

        prevBtn.disabled = current === 1;
        nextBtn.disabled = current === SLIDES.length;

        for (const btn of listEl.querySelectorAll("button[data-idx]")) {
          btn.setAttribute("aria-current", btn.dataset.idx === String(current) ? "true" : "false");
        }

        try { localStorage.setItem(STORAGE_KEY, String(current)); } catch {}
      }

      function go(delta) {
        setCurrent(current + delta);
      }

      function renderList() {
        listEl.innerHTML = "";
        for (const s of SLIDES) {
          const btn = document.createElement("button");
          btn.type = "button";
          btn.className = "slide-link";
          btn.dataset.idx = String(s.index);
          btn.setAttribute("role", "option");
          btn.innerHTML = `<span>${s.label}</span><small>${s.file}</small>`;
          btn.addEventListener("click", () => setCurrent(s.index));
          listEl.appendChild(btn);
        }
      }

      function updateScale() {
        const wrapRect = frameWrap.getBoundingClientRect();
        const styles = getComputedStyle(frameWrap);
        const padX = (parseFloat(styles.paddingLeft) || 0) + (parseFloat(styles.paddingRight) || 0);
        const padY = (parseFloat(styles.paddingTop) || 0) + (parseFloat(styles.paddingBottom) || 0);

        const targetW = Math.max(0, wrapRect.width - padX);
        const targetH = Math.max(0, wrapRect.height - padY);
        const scale = Math.min(targetW / 1280, targetH / 720);

        frameStage.style.setProperty("--scale", String(scale));
      }

      prevBtn.addEventListener("click", () => go(-1));
      nextBtn.addEventListener("click", () => go(1));

      reloadBtn.addEventListener("click", () => {
        const url = new URL(frame.src, window.location.href);
        url.searchParams.set("_t", String(Date.now()));
        frame.src = url.toString();
      });

      openTabBtn.addEventListener("click", () => {
        const slide = SLIDES[current - 1];
        window.open(slide.file, "_blank", "noopener,noreferrer");
      });

      window.addEventListener("keydown", (e) => {
        const key = e.key;
        if (key === "ArrowLeft") {
          e.preventDefault();
          go(-1);
        } else if (key === "ArrowRight") {
          e.preventDefault();
          go(1);
        }
      });

      // Basic swipe on frame area (mobile/tablet)
      let startX = null;
      frameWrap.addEventListener("touchstart", (e) => {
        if (!e.touches || e.touches.length !== 1) return;
        startX = e.touches[0].clientX;
      }, { passive: true });
      frameWrap.addEventListener("touchend", (e) => {
        if (startX === null) return;
        const endX = (e.changedTouches && e.changedTouches[0]) ? e.changedTouches[0].clientX : startX;
        const dx = endX - startX;
        startX = null;
        if (Math.abs(dx) < 40) return;
        if (dx > 0) go(-1);
        else go(1);
      });

      window.addEventListener("resize", () => updateScale());

      renderList();

      try {
        const saved = Number(localStorage.getItem(STORAGE_KEY));
        if (Number.isFinite(saved) && saved >= 1 && saved <= SLIDES.length) current = saved;
      } catch {}

      setCurrent(current);
      requestAnimationFrame(updateScale);
    </script>
  </body>
</html>
